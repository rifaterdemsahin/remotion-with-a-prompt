<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📄 Markdown Renderer — Remotion Studio</title>
  <link rel="stylesheet" href="assets/styles.css" />
  <style>
    .renderer-layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 0;
      min-height: calc(100vh - 100px);
    }

    @media (max-width: 768px) {
      .renderer-layout { grid-template-columns: 1fr; }
      .file-sidebar { display: none; }
    }

    .file-sidebar {
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      padding: 16px 0;
      position: sticky;
      top: 60px;
      height: calc(100vh - 60px);
      overflow-y: auto;
    }

    .sidebar-section { margin-bottom: 16px; }

    .sidebar-section-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 0 16px 8px;
    }

    .sidebar-link {
      display: block;
      padding: 7px 16px;
      font-size: 13px;
      color: var(--text-secondary);
      text-decoration: none;
      cursor: pointer;
      transition: all 0.15s;
      border-left: 2px solid transparent;
    }

    .sidebar-link:hover, .sidebar-link.active {
      color: var(--text-primary);
      background: var(--bg-tertiary);
      border-left-color: var(--accent);
    }

    .content-area {
      padding: 0;
    }

    .md-toolbar {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .md-toolbar select {
      flex: 1;
      max-width: 400px;
    }

    .md-content {
      padding: 40px 24px;
      max-width: 860px;
      margin: 0 auto;
    }

    #raw-view {
      display: none;
      padding: 24px;
    }

    #raw-view pre {
      max-height: calc(100vh - 200px);
      overflow: auto;
    }

    .loading-spinner {
      text-align: center;
      padding: 60px;
      color: var(--text-muted);
    }

    .loading-spinner .spin { font-size: 32px; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      background: rgba(248, 81, 73, 0.1);
      border: 1px solid var(--error);
      border-radius: var(--radius);
      padding: 16px 24px;
      color: var(--error);
      margin: 24px;
    }
  </style>
</head>
<body data-root="./">

    <a href="index.html" class="nav-logo">🎬 <span>Remotion</span> Studio</a>

      <input type="text" id="nav-search" placeholder="Search pages, docs..." autocomplete="off" />
      <span class="search-icon">🔍</span>
      <div id="search-dropdown"></div>
    </div>

    <div id="content-nav-items"></div>

    <div class="nav-actions">

      </a>

  <div class="renderer-layout">
    <!-- Sidebar: file list -->
    <aside class="file-sidebar" id="file-sidebar">
      <div id="sidebar-content">
        <div class="loading-spinner"><div class="spin">⟳</div></div>
      </div>
    </aside>

    <!-- Main content area -->
    <div class="content-area">
      <div class="md-toolbar">
        <label style="white-space:nowrap;font-size:13px;color:var(--text-secondary)">📄 File:</label>
        <select id="file-select" onchange="loadFromSelect()">
          <option value="">— Select a markdown file —</option>
        </select>
        <button class="btn btn-secondary btn-sm" onclick="toggleRaw()">⟨/⟩ Raw</button>
        <button class="btn btn-secondary btn-sm" onclick="copyMarkdown()">📋 Copy</button>
      </div>

      <div id="rendered-content" class="md-content">
        <div style="text-align:center; padding:80px 24px; color:var(--text-muted)">
          <div style="font-size:64px; margin-bottom:16px">📄</div>
          <h2 style="color:var(--text-secondary); margin-bottom:8px">Markdown Renderer</h2>
          <p>Select a file from the sidebar or dropdown to render it here.</p>
          <p style="margin-top:16px; font-size:13px">Pass <code>?file=path/to/file.md</code> in the URL to load directly.</p>
        </div>
      </div>

      <div id="raw-view">
        <pre id="raw-content" style="color:var(--text-primary)"></pre>
      </div>
    </div>
  </div>

  <script src="assets/nav-component.js"></script>
  <script>
    // All markdown files in the repo (mirrors search-index.json .md entries + additional)
    var markdownFiles = [
      { label: '📖 README', path: 'README.md', section: 'Root' },
      { label: '🤖 Agent Rules', path: 'aigent.md', section: 'Root' },
      { label: '🧠 Claude Rules', path: 'claude.md', section: 'Root' },
      { label: '❓ Real Unknown README', path: '1_Real_Unknown/README.md', section: '1_Real_Unknown' },
      { label: '🎯 OKRs', path: '1_Real_Unknown/okrs.md', section: '1_Real_Unknown' },
      { label: '🌍 Environment README', path: '2_Environment/README.md', section: '2_Environment' },
      { label: '🍎 Mac Setup', path: '2_Environment/setup-mac.md', section: '2_Environment' },
      { label: '🎨 Simulation README', path: '3_Simulation/README.md', section: '3_Simulation' },
      { label: '📐 Formula README', path: '4_Formula/README.md', section: '4_Formula' },
      { label: '🎥 Remotion Guide', path: '4_Formula/remotion-guide.md', section: '4_Formula' },
      { label: '💻 Symbols README', path: '5_Symbols/README.md', section: '5_Symbols' },
      { label: '🐛 Semblance README', path: '6_Semblance/README.md', section: '6_Semblance' },
      { label: '📝 Error Log', path: '6_Semblance/error-log.md', section: '6_Semblance' },
      { label: '🧪 Testing README', path: '7_Testing_Known/README.md', section: '7_Testing_Known' },
      { label: '✅ Checklist', path: '7_Testing_Known/checklist.md', section: '7_Testing_Known' },
    ];

    var currentRaw = '';
    var showingRaw = false;

    // Build sidebar
    function buildSidebar() {
      var sections = {};
      markdownFiles.forEach(function(f) {
        if (!sections[f.section]) sections[f.section] = [];
        sections[f.section].push(f);
      });

      var html = '';
      Object.keys(sections).forEach(function(sec) {
        html += '<div class="sidebar-section">';
        html += '<div class="sidebar-section-title">' + sec + '</div>';
        sections[sec].forEach(function(f) {
          html += '<a class="sidebar-link" onclick="loadFile(\'' + f.path + '\')" data-path="' + f.path + '">' + f.label + '</a>';
        });
        html += '</div>';
      });

      document.getElementById('sidebar-content').innerHTML = html;

      // Build select
      var sel = document.getElementById('file-select');
      var currentSection = '';
      markdownFiles.forEach(function(f) {
        if (f.section !== currentSection) {
          currentSection = f.section;
          var og = document.createElement('optgroup');
          og.label = currentSection;
          sel.appendChild(og);
        }
        var opt = document.createElement('option');
        opt.value = f.path;
        opt.textContent = f.label;
        sel.lastChild.appendChild(opt);
      });
    }

    function loadFromSelect() {
      var path = document.getElementById('file-select').value;
      if (path) loadFile(path);
    }

    function loadFile(path) {
      // Update sidebar active state
      document.querySelectorAll('.sidebar-link').forEach(function(el) {
        el.classList.toggle('active', el.getAttribute('data-path') === path);
      });

      // Update select
      document.getElementById('file-select').value = path;

      document.getElementById('rendered-content').innerHTML =
        '<div class="loading-spinner"><div class="spin" style="display:inline-block">⟳</div> Loading...</div>';
      document.getElementById('raw-view').style.display = 'none';
      document.getElementById('rendered-content').style.display = 'block';
      showingRaw = false;

      // Update URL
      history.replaceState(null, '', '?file=' + encodeURIComponent(path));

      fetch(path)
        .then(function(r) {
          if (!r.ok) throw new Error('File not found: ' + path + ' (HTTP ' + r.status + ')');
          return r.text();
        })
        .then(function(md) {
          currentRaw = md;
          document.getElementById('rendered-content').innerHTML =
            '<div class="markdown-body">' + renderMarkdown(md) + '</div>';
          document.getElementById('raw-content').textContent = md;
        })
        .catch(function(err) {
          document.getElementById('rendered-content').innerHTML =
            '<div class="error-msg">❌ ' + err.message + '</div>';
        });
    }

    function toggleRaw() {
      showingRaw = !showingRaw;
      document.getElementById('rendered-content').style.display = showingRaw ? 'none' : 'block';
      document.getElementById('raw-view').style.display = showingRaw ? 'block' : 'none';
    }

    function copyMarkdown() {
      if (!currentRaw) return;
      navigator.clipboard.writeText(currentRaw).then(function() {
        var btn = event.target;
        btn.textContent = '✅ Copied!';
        setTimeout(function() { btn.textContent = '📋 Copy'; }, 2000);
      });
    }

    // ── Simple Markdown Renderer ─────────────────────────────────────────────
    function renderMarkdown(md) {
      var html = md
        // Escape HTML first
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        // Code blocks (```)
        .replace(/```(\w*)\n([\s\S]*?)```/g, function(_, lang, code) {
          return '<pre><code class="language-' + lang + '">' + code + '</code></pre>';
        })
        // Inline code
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        // Headers
        .replace(/^#### (.+)$/gm, '<h4>$1</h4>')
        .replace(/^### (.+)$/gm, '<h3>$1</h3>')
        .replace(/^## (.+)$/gm, '<h2>$1</h2>')
        .replace(/^# (.+)$/gm, '<h1>$1</h1>')
        // Bold / italic
        .replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        // Blockquote
        .replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>')
        // Horizontal rule
        .replace(/^---+$/gm, '<hr/>')
        // Links
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>')
        // Images
        .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1" style="max-width:100%;border-radius:8px;" />')
        // Unordered lists
        .replace(/^\s*[-*+] (.+)$/gm, '<li>$1</li>')
        .replace(/(<li>.*<\/li>)\n(?!<li>)/g, '$1</ul>\n')
        .replace(/(?<!\n<\/ul>|<\/li>)\n(<li>)/g, '\n<ul>$1')
        // Ordered lists
        .replace(/^\d+\. (.+)$/gm, '<oli>$1</oli>')
        .replace(/(<oli>.*<\/oli>)\n(?!<oli>)/g, '$1</ol>\n')
        .replace(/(?<!\n<\/ol>|<\/oli>)\n(<oli>)/g, '\n<ol>$1')
        .replace(/<oli>/g, '<li>').replace(/<\/oli>/g, '</li>')
        // Paragraphs
        .replace(/\n{2,}/g, '</p><p>')
        .replace(/^(.+)$/gm, function(line) {
          if (line.match(/^<(h[1-6]|ul|ol|li|pre|blockquote|hr|img)/)) return line;
          return line;
        });

      // Wrap in paragraphs
      html = '<p>' + html + '</p>';
      html = html.replace(/<p>(\s*<(h[1-6]|ul|ol|pre|blockquote|hr))/g, '$1');
      html = html.replace(/(<\/(h[1-6]|ul|ol|pre|blockquote)>)\s*<\/p>/g, '$1');

      return html;
    }

    // Init
    buildSidebar();

    // Load from URL param
    var urlParams = new URLSearchParams(window.location.search);
    var fileParam = urlParams.get('file');
    if (fileParam) {
      loadFile(fileParam);
    }
  </script>
</body>
</html>
