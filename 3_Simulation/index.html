      margin-top: 24px;

    .mockup-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    .mockup-preview {
      aspect-ratio: 16/9;
      background: #000;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .mockup-preview canvas { width: 100%; height: 100%; }

    .mockup-info { padding: 16px; }
    .mockup-info h3 { font-size: 15px; margin-bottom: 4px; }
    .mockup-info p { font-size: 12px; color: var(--text-secondary); }
  </style>

        <button class="carousel-btn prev" onclick="carouselPrev()">‹</button>

  <script src="../assets/nav-component.js"></script>
  <script>
    // ── Carousel ──────────────────────────────────────────────────────────────
    var slides = [
      { title: '🎬 Prompt Studio', desc: 'Enter a prompt, upload images, generate code', color1: '#7c3aed', color2: '#3b82f6', text: 'Prompt Studio' },
      { title: '🖼️ Image Loading', desc: 'Drag & drop or URL-based image loading', color1: '#059669', color2: '#0891b2', text: 'Image Loading' },
      { title: '▶️ Live Preview', desc: 'CSS Canvas animation preview', color1: '#dc2626', color2: '#ea580c', text: 'Live Preview' },
      { title: '💻 Code Output', desc: 'Production-ready Remotion TSX', color1: '#7c3aed', color2: '#ec4899', text: 'Code Output' },
      { title: '🧪 Test Results', desc: 'Validated against OKRs', color1: '#0891b2', color2: '#7c3aed', text: 'Test Results' },
    ];

    var currentSlide = 0;

    function buildCarousel() {
      var track = document.getElementById('carousel-track');
      var dots = document.getElementById('carousel-dots');

      track.innerHTML = slides.map(function(s, i) {
        return '<div class="carousel-slide">' +
          '<canvas id="slide-canvas-' + i + '" width="640" height="200" style="border-radius:8px;max-width:100%"></canvas>' +
          '</div>';
      }).join('');

      dots.innerHTML = slides.map(function(_, i) {
        return '<button class="carousel-dot' + (i === 0 ? ' active' : '') + '" onclick="goToSlide(' + i + ')"></button>';
      }).join('');

      slides.forEach(function(s, i) {
        renderSlide(i, s);
      });

      // Auto-advance
      setInterval(function() { goToSlide((currentSlide + 1) % slides.length); }, 3500);
    }

    function renderSlide(i, s) {
      var canvas = document.getElementById('slide-canvas-' + i);
      if (!canvas) return;
      var ctx = canvas.getContext('2d');
      var w = canvas.width, h = canvas.height;

      var grad = ctx.createLinearGradient(0, 0, w, h);
      grad.addColorStop(0, s.color1);
      grad.addColorStop(1, s.color2);
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, w, h);

      ctx.fillStyle = 'rgba(255,255,255,0.08)';
      for (var j = 0; j < 6; j++) {
        ctx.beginPath();
        ctx.arc(100 + j*120, h/2, 60 + j*10, 0, Math.PI*2);
        ctx.fill();
      }

      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      ctx.font = 'bold 28px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(s.text, w/2, h/2 - 16);

      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      ctx.font = '14px sans-serif';
      ctx.fillText(s.desc, w/2, h/2 + 20);
    }

    function goToSlide(idx) {
      currentSlide = idx;
      document.getElementById('carousel-track').style.transform = 'translateX(-' + (idx * 100) + '%)';
      document.querySelectorAll('.carousel-dot').forEach(function(dot, i) {
        dot.classList.toggle('active', i === idx);
      });
    }

    function carouselPrev() { goToSlide((currentSlide - 1 + slides.length) % slides.length); }
    function carouselNext() { goToSlide((currentSlide + 1) % slides.length); }

    // ── Mockup Grid ───────────────────────────────────────────────────────────
    var mockups = [
      { title: '🎬 Prompt Input', desc: 'Text area with example chips and settings panel', bg: ['#1a0533','#2d0a4e'], label: 'Input Panel' },
      { title: '🖼️ Image Zone', desc: 'Drag-and-drop with URL fallback and thumbnail grid', bg: ['#0d2a1a','#0d3730'], label: 'Image Zone' },
      { title: '▶️ Canvas Preview', desc: '16:9 animated canvas with playback controls', bg: ['#2a0d0d','#1a1a0d'], label: 'Preview' },
      { title: '💻 Code View', desc: 'Syntax-highlighted TSX with copy/download', bg: ['#0d1a33','#0d2a4e'], label: 'Code Output' },
    ];

    function buildMockups() {
      var grid = document.getElementById('mockup-grid');
      grid.innerHTML = mockups.map(function(m, i) {
        return '<div class="mockup-card">' +
          '<div class="mockup-preview"><canvas id="mock-canvas-' + i + '" width="320" height="180"></canvas></div>' +
          '<div class="mockup-info"><h3>' + m.title + '</h3><p>' + m.desc + '</p></div>' +
          '</div>';
      }).join('');

      mockups.forEach(function(m, i) {
        var c = document.getElementById('mock-canvas-' + i);
        var ctx = c.getContext('2d');
        var grad = ctx.createLinearGradient(0, 0, c.width, c.height);
        grad.addColorStop(0, m.bg[0]);
        grad.addColorStop(1, m.bg[1]);
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, c.width, c.height);
        ctx.fillStyle = 'rgba(255,255,255,0.7)';
        ctx.font = 'bold 18px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(m.label, c.width/2, c.height/2);
      });
    }

    buildCarousel();
    buildMockups();
  </script>
