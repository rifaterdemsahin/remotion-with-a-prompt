  <script>
    var checklistData = [
      {
        section: '🎬 Prompt Studio',
        items: [
          'Page loads without errors',
          'Prompt textarea accepts input',
          'Example prompt chips populate textarea on click',
          'Generate button triggers code generation',
          'Empty prompt shows error status',
          'Duration/FPS/resolution settings apply to generated code',
          'Clear button resets all inputs',
        ]
      },
      {
        section: '🖼️ Image Loading',
        items: [
          'File upload via click works (PNG, JPG)',
          'Drag and drop works',
          'Multiple images can be uploaded',
          'Image URL input adds image to grid',
          'Image thumbnails show with var labels (img1, img2...)',
          'Remove button deletes image from grid',
          'Uploaded images appear in generated Remotion code',
        ]
      },
      {
        section: '▶️ Preview',
        items: [
          'Preview canvas renders after generation',
          'Animation plays automatically',
          'Play/pause button works',
          'Reset button restarts animation',
          'Progress bar advances during playback',
          'Time counter shows correct time',
          'Fade animation visible in preview',
          'Zoom animation visible in preview',
          'Slide animation visible in preview',
          'Text appears in preview',
        ]
      },
      {
        section: '💻 Code Generation',
        items: [
          'Generated code is valid TypeScript syntax',
          'Code includes Remotion imports',
          'spring() used for animations',
          'AbsoluteFill is root element',
          'Images generate Img component with src',
          'Text generates div with inline styles',
          'Gradient text generates correct WebkitBackgroundClip styles',
          'Copy button copies code to clipboard',
          'Download button saves .tsx file',
        ]
      },
      {
        section: '🧭 Navigation',
        items: [
          'Debug nav hidden by default',
          'Debug button (🐛) toggles debug nav',
          'Debug nav shows all 7 folder links',
          'Debug nav links navigate to correct pages',
          'Content nav loads from menu-content.json',
          'Search box filters pages by title and tags',
          'Search dropdown shows results',
          'Clicking search result navigates to page',
          'Social links (GitHub, LinkedIn, YouTube) open correctly',
        ]
      },
      {
        section: '📱 Responsive',
        items: [
          'Layout works on mobile (< 768px)',
          'Nav wraps on small screens',
          'Studio columns stack on mobile',
          'Text is readable without horizontal scroll',
        ]
      },
      {
        section: '📄 Markdown Renderer',
        items: [
          'markdown_renderer.html loads',
          'Sidebar shows all markdown files',
          'Selecting file renders markdown content',
          'Code blocks are displayed in pre/code',
          'Raw view toggle works',
          'URL parameter ?file= loads file directly',
          'Copy button copies raw markdown',
        ]
      },
      {
        section: '🚀 Deployment',
        items: [
          'GitHub Actions workflow exists',
          'Push to main triggers workflow',
          'Pages deploys successfully (green check)',
          'Deployed site accessible at GitHub Pages URL',
          'All navigation links work on deployed site',
          'Images load on deployed site',
        ]
      }
    ];

    var checkState = {};
    var STORAGE_KEY = 'remotion-checklist-v1';

    function loadState() {
      try {
        var saved = localStorage.getItem(STORAGE_KEY);
        if (saved) checkState = JSON.parse(saved);
      } catch(e) {}
    }

    function saveState() {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(checkState)); } catch(e) {}
    }

    function buildChecklists() {
      var container = document.getElementById('checklists');
      var html = '';

      checklistData.forEach(function(section, si) {
        var pct = calcSectionPct(si);
        html += '<div class="card checklist-section" style="margin-bottom:16px">';
        html += '<div class="checklist-section-title">' + section.section + '</div>';
        html += '<div class="progress-wrap"><div class="progress-fill section-progress-' + si + '" style="width:' + pct + '%"></div></div>';
        html += '<div class="score-label section-score-' + si + '">' + countChecked(si) + ' / ' + section.items.length + ' done</div>';
        html += '<div style="margin-top:12px">';
        section.items.forEach(function(item, ii) {
          var key = si + '-' + ii;
          var checked = checkState[key] || false;
          html += '<div class="check-item' + (checked ? ' checked' : '') + '" id="ci-' + key + '">';
          html += '<input type="checkbox" id="cb-' + key + '"' + (checked ? ' checked' : '') + ' onchange="toggle(\'' + key + '\')" />';
          html += '<label for="cb-' + key + '">' + item + '</label>';
          html += '</div>';
        });
        html += '</div></div>';
      });

      container.innerHTML = html;
      updateOverall();
    }

    function toggle(key) {
      checkState[key] = document.getElementById('cb-' + key).checked;
      var ci = document.getElementById('ci-' + key);
      if (ci) ci.classList.toggle('checked', checkState[key]);
      saveState();
      var parts = key.split('-');
      var si = parseInt(parts[0]);
      updateSectionProgress(si);
      updateOverall();
    }

    function countChecked(si) {
      var count = 0;
      checklistData[si].items.forEach(function(_, ii) {
        if (checkState[si + '-' + ii]) count++;
      });
      return count;
    }

    function calcSectionPct(si) {
      var total = checklistData[si].items.length;
      return total ? Math.round(countChecked(si) / total * 100) : 0;
    }

    function updateSectionProgress(si) {
      var pct = calcSectionPct(si);
      var fill = document.querySelector('.section-progress-' + si);
      var score = document.querySelector('.section-score-' + si);
      if (fill) fill.style.width = pct + '%';
      if (score) score.textContent = countChecked(si) + ' / ' + checklistData[si].items.length + ' done';
    }

    function updateOverall() {
      var total = 0, checked = 0;
      checklistData.forEach(function(s, si) {
        total += s.items.length;
        checked += countChecked(si);
      });
      var pct = total ? Math.round(checked / total * 100) : 0;
      var fill = document.querySelector('#overall-progress-bar .progress-fill');
      if (fill) fill.style.width = pct + '%';
      var score = document.getElementById('overall-score');
      if (score) score.textContent = checked + ' / ' + total + ' checks completed (' + pct + '%)';
    }

    function resetAll() {
      if (!confirm('Reset all checklist progress?')) return;
      checkState = {};
      saveState();
      buildChecklists();
    }

    loadState();
    buildChecklists();
  </script>
