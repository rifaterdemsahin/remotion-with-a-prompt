# Remotion Prompt Studio — Template Registry
# Updated automatically when new templates are added.
# Categories: Basic | Motion | Text | Background | Numbers | Diagram

version: "1.0"

templates:

  # ─── Basic ──────────────────────────────────────────────────────────────────
  - id: fade
    name: Fade
    category: Basic
    icon: "🌅"
    description: Smooth opacity fade-in (and optional fade-out) of text and background.
    keywords:
      - fade
      - fade in
      - fade out
      - opacity
      - appear
      - disappear
      - dissolve
    needsImage: true
    fields:
      - id: textContent
        label: Text
        type: text
      - id: bgColor
        label: Background Color
        type: color
      - id: textColor
        label: Text Color
        type: color
      - id: fontSize
        label: Font Size (px)
        type: number
      - id: fontWeight
        label: Font Weight
        type: select
        options: [400, 600, 700, 800, 900]
      - id: fadeOut
        label: Fade Out
        type: toggle
      - id: hasGradientText
        label: Gradient Text
        type: toggle
      - id: durationSec
        label: Duration (s)
        type: number

  # ─── Motion ─────────────────────────────────────────────────────────────────
  - id: slide
    name: Slide
    category: Motion
    icon: "➡️"
    description: Text slides in from a chosen direction using a spring animation.
    keywords:
      - slide
      - slide in
      - slide out
      - move
      - enter
      - left
      - right
      - up
      - down
      - direction
    needsImage: true
    fields:
      - id: textContent
        label: Text
        type: text
      - id: slideDirection
        label: Direction
        type: select
        options: [left, right, up, down]
      - id: bgColor
        label: Background Color
        type: color
      - id: textColor
        label: Text Color
        type: color
      - id: fontSize
        label: Font Size (px)
        type: number
      - id: durationSec
        label: Duration (s)
        type: number

  - id: zoom
    name: Zoom
    category: Motion
    icon: "🔍"
    description: Text zooms in from small scale to full size, optionally with a fade.
    keywords:
      - zoom
      - zoom in
      - zoom out
      - scale
      - grow
      - shrink
      - magnify
    needsImage: true
    fields:
      - id: textContent
        label: Text
        type: text
      - id: bgColor
        label: Background Color
        type: color
      - id: textColor
        label: Text Color
        type: color
      - id: fontSize
        label: Font Size (px)
        type: number
      - id: zoomIn
        label: Zoom In
        type: toggle
      - id: durationSec
        label: Duration (s)
        type: number

  - id: bounce
    name: Bounce
    category: Motion
    icon: "🎪"
    description: Text bounces in with a low-damping spring for a playful elastic effect.
    keywords:
      - bounce
      - elastic
      - spring
      - pop
      - rubber
      - playful
      - jump
    needsImage: true
    fields:
      - id: textContent
        label: Text
        type: text
      - id: bgColor
        label: Background Color
        type: color
      - id: textColor
        label: Text Color
        type: color
      - id: fontSize
        label: Font Size (px)
        type: number
      - id: durationSec
        label: Duration (s)
        type: number

  - id: rotate
    name: Rotate
    category: Motion
    icon: "🔄"
    description: Text spins into view with a rotation + fade-in combo.
    keywords:
      - rotate
      - spin
      - turn
      - revolve
      - twist
      - angular
    needsImage: true
    fields:
      - id: textContent
        label: Text
        type: text
      - id: bgColor
        label: Background Color
        type: color
      - id: textColor
        label: Text Color
        type: color
      - id: fontSize
        label: Font Size (px)
        type: number
      - id: durationSec
        label: Duration (s)
        type: number

  # ─── Text ───────────────────────────────────────────────────────────────────
  - id: typewriter
    name: Typewriter
    category: Text
    icon: "⌨️"
    description: Characters appear one by one, simulating live typing.
    keywords:
      - typewriter
      - typing
      - type
      - characters
      - letter by letter
      - text reveal
      - code typing
    needsImage: false
    fields:
      - id: textContent
        label: Text
        type: text
      - id: bgColor
        label: Background Color
        type: color
      - id: textColor
        label: Text Color
        type: color
      - id: fontSize
        label: Font Size (px)
        type: number
      - id: durationSec
        label: Duration (s)
        type: number

  - id: typewriter-cursor
    name: Typewriter + Cursor
    category: Text
    icon: "🖥️"
    description: Same as typewriter but adds a blinking | cursor at the insertion point.
    keywords:
      - typewriter cursor
      - blinking cursor
      - cursor
      - terminal
      - command line
      - cli
      - code editor
    needsImage: false
    fields:
      - id: textContent
        label: Text
        type: text
      - id: bgColor
        label: Background Color
