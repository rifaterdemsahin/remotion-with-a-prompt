      - count
      - count up
      - number
      - increment
      - odometer
      - tally
      - statistic
      - metric
    needsImage: false
    fields:
      - id: counterTarget
        label: Target Number
        type: number
      - id: counterPrefix
        label: Prefix (e.g. $)
        type: text
      - id: counterSuffix
        label: Suffix (e.g. %)
        type: text
      - id: bgColor
