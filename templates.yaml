        type: color
      - id: fontSize
        label: Font Size (px)
        type: number
      - id: durationSec
        label: Duration (s)
        type: number

  - id: stagger
    name: Stagger List
    category: Text
    icon: "📋"
    description: Multiple lines appear one after another with a staggered spring entrance.
    keywords:
      - stagger
      - list
      - bullet points
      - items
      - steps
      - checklist
      - lines
      - sequential
      - one by one
    needsImage: false
    fields:
      - id: staggerItems
        label: Items (comma-separated)
        type: textarea
      - id: bgColor
        label: Background Color
        type: color
      - id: textColor
        label: Text Color
        type: color
      - id: fontSize
        label: Font Size (px)
        type: number
      - id: durationSec
        label: Duration (s)
        type: number

  - id: wave
    name: Wave
    category: Text
    icon: "🌊"
    description: Each character oscillates up and down with a phase-shifted sine wave.
    keywords:
      - wave
      - wavy
      - ripple
      - bounce text
      - oscillate
      - sin wave
      - flowing
    needsImage: false
    fields:
      - id: textContent
        label: Text
        type: text
      - id: bgColor
        label: Background Color
        type: color
      - id: textColor
        label: Text Color
        type: color
      - id: fontSize
        label: Font Size (px)
        type: number
      - id: durationSec
        label: Duration (s)
        type: number

  # ─── Background ─────────────────────────────────────────────────────────────
  - id: particle
    name: Particles
    category: Background
    icon: "✨"
