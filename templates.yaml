      - sparkle
      - stars
      - ambient
    needsImage: false
    fields:
      - id: textContent
        label: Text
        type: text
      - id: bgColor
        label: Background Color
        type: color
      - id: textColor
        label: Text Color
        type: color
      - id: fontSize
        label: Font Size (px)
        type: number
      - id: particleCount
        label: Particle Count
